<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Clock</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <div class="head">
      <h1>DIGITAL</h1>
      <h1>CLOCK</h1>
    </div>

    <div class="box">
       <div><img height="50" class="invert"  src="clock.svg"></div>
       <div class="time">
        <span id="hours">2</span> <h1>:</h1> 
         <span id="mins">39</span><h1>:</h1> 
         <span id="secs">40</span>

       </div>
       <div class="break">
          <div class="line"></div><h1 class="invert">•</h1><div class="line"></div>
       </div>
       <div class="dates">
        <div><img height="30" class="invert"  src="calendar.svg"></div>
        <p class="day">Wednesday</p>,
        <p id="date">2</p>
        <p id="month">July</p>
        <p id="year">2005</p>
       </div>
    </div>

  </div>




  <script src="script.js"></script>
</body>

</html>
